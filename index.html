<!DOCTYPE html>
<html lang="fa" dir="rtl" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیشخوان هوشمند عادات دسکتاپ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.js"></script>
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="text-slate-800 min-h-full pb-12 antialiased bg-slate-50 selection:bg-slate-200">

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
        <header class="bg-white border border-slate-200/80 rounded-2xl p-6 mb-8 shadow-[0_2px_8px_-3px_rgba(0,0,0,0.05)] flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">پیشخوان هوشمند رهگیری عادات</h1>
                <p id="current-date-display" class="text-sm text-slate-400 font-medium mt-1.5">امروز: ...</p>
            </div>
            
            <div class="flex items-center gap-1.5 bg-slate-50 border border-slate-200/60 p-1 rounded-xl">
                <button onclick="navigateWeek(1)" class="p-2 hover:bg-white rounded-lg text-slate-500 hover:text-slate-900 shadow-xs hover:shadow-sm transition-all duration-200 active:scale-95" title="هفته بعدی">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <div class="px-4 text-center min-w-[180px]">
                    <span id="current-week-display" class="text-sm font-bold text-slate-700 tracking-wide block">...</span>
                </div>
                <button onclick="navigateWeek(-1)" class="p-2 hover:bg-white rounded-lg text-slate-500 hover:text-slate-900 shadow-xs hover:shadow-sm transition-all duration-200 active:scale-95" title="هفته قبلی">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="mb-8">
            <div class="flex justify-between items-center mb-4 px-1">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-1.5">
                    <span class="w-1 h-3.5 bg-slate-800 rounded-full inline-block"></span>
                    جدول هفتگی ارزیابی عادات
                </h2>
                <div class="flex items-center gap-2.5">
                    <button id="edit-mode-btn" onclick="toggleEditMode()" class="text-sm font-medium bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 px-3.5 py-1.5 rounded-xl transition-all shadow-2xs flex items-center gap-1 active:scale-95">
                        ⚙️ ویرایش
                    </button>
                    <span id="habits-count-badge" class="bg-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-lg font-bold">۰ عادت</span>
                </div>
            </div>
            
            <div class="bg-white border border-slate-200 rounded-2xl shadow-xs overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-slate-50/70 border-b border-slate-200 text-sm font-bold text-slate-400 tracking-wider">
                                <th class="p-4 w-1/4">عنوان عادت و مداومت</th>
                                <th class="p-4 text-center px-1">شنبه</th>
                                <th class="p-4 text-center px-1">۱شنبه</th>
                                <th class="p-4 text-center px-1">۲شنبه</th>
                                <th class="p-4 text-center px-1">۳شنبه</th>
                                <th class="p-4 text-center px-1">۴شنبه</th>
                                <th class="p-4 text-center px-1">۵شنبه</th>
                                <th class="p-4 text-center px-1">جمعه</th>
                                <th class="p-4 text-center w-1/6">پیشرفت هفته</th>
                                <th class="p-4 text-center w-12">عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="habits-table-body" class="divide-y divide-slate-100 text-base font-medium"></tbody>
                    </table>
                </div>
                <div id="empty-state" class="hidden text-center py-16 bg-white">
                    <p class="text-slate-400 text-base font-normal">هیچ عادتی ثبت نشده است.</p>
                </div>
            </div>
        </main>

        <section id="monthly-trends-section" class="mb-8 bg-white border border-slate-200 rounded-2xl p-5 shadow-xs hidden">
            <h2 id="monthly-trends-title" class="text-sm font-bold text-slate-500 mb-5 flex items-center gap-1.5">
                <span class="w-1 h-3.5 bg-indigo-500 rounded-full inline-block"></span>
                ماتریس ارزیابی ۲۸ روز اخیر
            </h2>
            <div id="monthly-charts-container" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </section>

        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-xs">
            <h2 class="text-sm font-bold text-slate-500 mb-4 flex items-center gap-1.5">
                <span class="w-1 h-3.5 bg-slate-400 rounded-full inline-block"></span>
                تعریف عادت جدید
            </h2>
            <form id="add-habit-form" class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <input type="text" id="habit-title" required placeholder="مثلاً: ورزش، مطالعه، سحرخیزی..." 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-base text-slate-900 focus:outline-none focus:border-slate-400 focus:bg-white transition-all placeholder:text-slate-400">
                </div>
                <div class="w-full md:w-48">
                    <select id="habit-goal" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-base text-slate-700 focus:outline-none focus:border-slate-400 focus:bg-white transition-all">
                        <option value="7">۷ روز (هر روز)</option>
                        <option value="6">۶ روز در هفته</option>
                        <option value="5">۵ روز در هفته</option>
                        <option value="4">۴ روز در هفته</option>
                        <option value="3">۳ روز در هفته</option>
                        <option value="2">۲ روز در هفته</option>
                        <option value="1">۱ روز در هفته</option>
                    </select>
                </div>
                <button type="submit" class="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-medium px-5 py-2 rounded-xl transition-all duration-200 active:scale-[0.98] whitespace-nowrap text-base">
                    + افزودن به جدول
                </button>
            </form>
        </section>
    </div>

    <script>
        const JALAALI_MONTHS = ["فروردین", "اردیبهشت", "خرداد", "تیر", "مرداد", "شهریور", "مهر", "آبان", "آذر", "دی", "بهمن", "اسفند"];
        const WEEKDAYS_FA = ["یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه", "شنبه"];
        
        const COLOR_PALETTES = [
            { bg: "bg-emerald-500", border: "border-emerald-500", text: "text-emerald-600", lightBg: "bg-emerald-50", opacityBg: "bg-emerald-500/15 text-emerald-700", weekCapsule: "bg-emerald-500/10" },
            { bg: "bg-sky-500", border: "border-sky-500", text: "text-sky-600", lightBg: "bg-sky-50", opacityBg: "bg-sky-500/15 text-sky-700", weekCapsule: "bg-sky-500/10" },
            { bg: "bg-indigo-500", border: "border-indigo-500", text: "text-indigo-600", lightBg: "bg-indigo-50", opacityBg: "bg-indigo-500/15 text-indigo-700", weekCapsule: "bg-indigo-500/10" },
            { bg: "bg-purple-500", border: "border-purple-500", text: "text-purple-600", lightBg: "bg-purple-50", opacityBg: "bg-purple-500/15 text-purple-700", weekCapsule: "bg-purple-500/10" },
            { bg: "bg-rose-500", border: "border-rose-500", text: "text-rose-600", lightBg: "bg-rose-50", opacityBg: "bg-rose-500/15 text-rose-700", weekCapsule: "bg-rose-500/10" },
            { bg: "bg-amber-500", border: "border-amber-500", text: "text-amber-600", lightBg: "bg-amber-50", opacityBg: "bg-amber-500/15 text-amber-700", weekCapsule: "bg-amber-500/10" }
        ];

        let habits = [];
        let weekOffset = 0; 
        let isEditMode = false; 

        function toPersianDigits(num) {
            if (num === undefined || num === null) return '';
            return num.toString().replace(/[0-9]/g, w => ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'][+w]);
        }

        function getJalaliStats(offset = 0) {
            const today = new Date();
            const currentDay = today.getDay();
            const daysToSaturday = currentDay === 6 ? 0 : -(currentDay + 1);
            
            const targetSat = new Date(today);
            targetSat.setDate(today.getDate() + daysToSaturday + (offset * 7));
            
            const targetFri = new Date(targetSat);
            targetFri.setDate(targetSat.getDate() + 6);

            const jSat = jalaali.toJalaali(targetSat.getFullYear(), targetSat.getMonth() + 1, targetSat.getDate());
            const jFri = jalaali.toJalaali(targetFri.getFullYear(), targetFri.getMonth() + 1, targetFri.getDate());
            
            const weekKey = `W-${targetSat.getFullYear()}-${String(targetSat.getMonth()+1).padStart(2,'0')}-${String(targetSat.getDate()).padStart(2,'0')}`;
            const jToday = jalaali.toJalaali(today.getFullYear(), today.getMonth() + 1, today.getDate());

            return { weekKey, weekRangeStr: `${jSat.jd} ${JALAALI_MONTHS[jSat.jm - 1]} تا ${jFri.jd} ${JALAALI_MONTHS[jFri.jm - 1]} ${jFri.jy}`, realJToday: jToday };
        }

        function getStatusByDate(habit, dateObj) {
            const cDay = dateObj.getDay();
            const daysToSat = cDay === 6 ? 0 : -(cDay + 1);
            const sat = new Date(dateObj);
            sat.setDate(dateObj.getDate() + daysToSat);
            
            const wkKey = `W-${sat.getFullYear()}-${String(sat.getMonth()+1).padStart(2,'0')}-${String(sat.getDate()).padStart(2,'0')}`;
            const dIdx = dateObj.getDay() === 6 ? 0 : dateObj.getDay() + 1;

            const weekData = habit.history[wkKey] || [false, false, false, false, false, false, false];
            return { isChecked: weekData[dIdx] === true, weekKey: wkKey, dayIndex: dIdx };
        }

        function isGraceDayForDate(habit, dateObj) {
            if (habit.weeklyGoal !== 7) return false;
            const currentInfo = getStatusByDate(habit, dateObj);
            if (currentInfo.isChecked) return false;

            let beforeDate = new Date(dateObj); beforeDate.setDate(beforeDate.getDate() - 1);
            const hasCheckedBefore = getStatusByDate(habit, beforeDate).isChecked;

            let afterDate = new Date(dateObj); afterDate.setDate(afterDate.getDate() + 1);
            const hasCheckedAfter = getStatusByDate(habit, afterDate).isChecked;

            return hasCheckedBefore && hasCheckedAfter;
        }

        function calculateJalaliStreak(habit) {
            let streak = 0; let checkDate = new Date(); 
            for (let i = 0; i < 90; i++) {
                const currentInfo = getStatusByDate(habit, checkDate);
                const isGrace = isGraceDayForDate(habit, checkDate);
                if (currentInfo.isChecked || isGrace) { streak++; } else { if (i === 0) { checkDate.setDate(checkDate.getDate() - 1); continue; } break; }
                checkDate.setDate(checkDate.getDate() - 1); 
            }
            return streak;
        }

        window.navigateWeek = function(direction) { weekOffset += direction; renderApp(); };

        window.toggleEditMode = function() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('edit-mode-btn');
            if (isEditMode) {
                btn.innerText = "✓ خروج";
                btn.className = "text-sm font-bold bg-slate-900 hover:bg-slate-800 text-white px-3.5 py-1.5 rounded-xl transition-all shadow-2xs flex items-center gap-1 active:scale-95";
            } else {
                btn.innerText = "⚙️ ویرایش";
                btn.className = "text-sm font-medium bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 px-3.5 py-1.5 rounded-xl transition-all shadow-2xs flex items-center gap-1 active:scale-95";
            }
            renderApp();
        };

        window.editHabitTitle = function(id) {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;
            const newTitle = prompt("نام جدید این عادت را وارد کنید:", habit.title);
            if (newTitle && newTitle.trim() !== "") {
                habit.title = newTitle.trim();
                saveDataToDisk();
                renderApp();
            }
        };

        window.moveHabit = function(id, direction) {
            const index = habits.findIndex(h => h.id === id);
            if (index === -1) return;
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= habits.length) return;

            const temp = habits[index];
            habits[index] = habits[newIndex];
            habits[newIndex] = temp;

            saveDataToDisk();
            renderApp();
        };

        window.toggleDayNode = function(habitId, weekKey, dayIndex) {
            if (isEditMode) return;

            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;
            if (!habit.history[weekKey]) habit.history[weekKey] = [false, false, false, false, false, false, false];

            habit.history[weekKey][dayIndex] = !habit.history[weekKey][dayIndex];
            habits.forEach(h => h.currentStreak = calculateJalaliStreak(h));
            
            saveDataToDisk();
            renderApp();
        };

        function renderApp() {
            const tbody = document.getElementById('habits-table-body');
            const emptyState = document.getElementById('empty-state');
            const badgeCount = document.getElementById('habits-count-badge');
            const trendsSection = document.getElementById('monthly-trends-section');
            const chartsContainer = document.getElementById('monthly-charts-container');
            
            const stats = getJalaliStats(weekOffset);
            document.getElementById('current-week-display').innerText = `هفتهٔ ${toPersianDigits(stats.weekRangeStr)}`;
            tbody.innerHTML = ''; chartsContainer.innerHTML = '';
            badgeCount.innerText = `${toPersianDigits(habits.length)} عادت`;

            if (habits.length === 0) {
                emptyState.classList.remove('hidden'); trendsSection.classList.add('hidden'); return;
            } else {
                emptyState.classList.add('hidden'); trendsSection.classList.remove('hidden');
            }

            habits.forEach(habit => {
                if (!habit.history[stats.weekKey]) habit.history[stats.weekKey] = [false, false, false, false, false, false, false];
                const weekData = habit.history[stats.weekKey];
                
                let effectiveCompletions = 0;
                weekData.forEach((status, idx) => {
                    const targetSat = new Date(); const currentDay = targetSat.getDay();
                    const daysToSaturday = currentDay === 6 ? 0 : -(currentDay + 1);
                    targetSat.setDate(targetSat.getDate() + daysToSaturday + (weekOffset * 7));
                    const currentCheckDate = new Date(targetSat); currentCheckDate.setDate(targetSat.getDate() + idx);
                    if (status === true || isGraceDayForDate(habit, currentCheckDate)) effectiveCompletions++;
                });
                const percentage = Math.min(Math.round((effectiveCompletions / habit.weeklyGoal) * 100), 100);
                const palette = habit.colorPalette;

                const tr = document.createElement('tr'); tr.className = "hover:bg-slate-50/50 transition-colors";
                let daysHtml = '';
                for (let i = 0; i < 7; i++) {
                    const isChecked = weekData[i];
                    const targetSat = new Date(); const currentDay = targetSat.getDay();
                    const daysToSaturday = currentDay === 6 ? 0 : -(currentDay + 1);
                    targetSat.setDate(targetSat.getDate() + daysToSaturday + (weekOffset * 7));
                    const currentCheckDate = new Date(targetSat); currentCheckDate.setDate(targetSat.getDate() + i);
                    const isGrace = isGraceDayForDate(habit, currentCheckDate);
                    
                    let btnClasses = "w-8 h-8 rounded-lg flex items-center justify-center border-2 transition-all duration-200 mx-auto text-sm font-bold active:scale-90 hover:scale-105 ";
                    let content = "";
                    if (isChecked) { btnClasses += `${palette.bg} ${palette.border} text-white shadow-2xs`; content = "✓"; }
                    else if (isGrace) { btnClasses += `${palette.opacityBg} border-transparent`; content = "✓"; }
                    else { btnClasses += `bg-white border-slate-200 hover:border-slate-300 text-transparent`; content = " "; }

                    daysHtml += `<td class="p-1.5 text-center"><button ${isEditMode ? 'disabled' : ''} onclick="toggleDayNode('${habit.id}', '${stats.weekKey}', ${i})" class="${btnClasses} ${isEditMode ? 'opacity-30 cursor-not-allowed hover:scale-100 active:scale-100' : ''}">${content}</button></td>`;
                }

                const editControlsHtml = isEditMode ? `
                    <div class="flex items-center gap-1 ml-1 bg-slate-50 p-1 rounded-md border border-slate-200 shadow-2xs">
                        <button onclick="editHabitTitle('${habit.id}')" class="text-slate-500 hover:text-slate-800 transition-colors p-0.5" title="ویرایش نام">✏️</button>
                        <div class="flex flex-col gap-0.5">
                            <button onclick="moveHabit('${habit.id}', -1)" class="text-slate-400 hover:text-slate-700 transition-colors" title="بالا بردن">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7" /></svg>
                            </button>
                            <button onclick="moveHabit('${habit.id}', 1)" class="text-slate-400 hover:text-slate-700 transition-colors" title="پایین آوردن">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
                            </button>
                        </div>
                    </div>
                ` : '';

                tr.innerHTML = `
                    <td class="p-4">
                        <div class="flex items-center gap-1.5">
                            ${editControlsHtml}
                            <div>
                                <div class="font-bold text-slate-900 text-base">${habit.title}</div>
                                <div class="flex items-center gap-1.5 mt-1">
                                    <span class="text-xs text-slate-400">هدف: ${toPersianDigits(habit.weeklyGoal)} روز</span>
                                    <span class="inline-block w-1 h-1 bg-slate-200 rounded-full"></span>
                                    <span class="text-xs font-bold ${palette.text}">🔥 ${toPersianDigits(habit.currentStreak)}</span>
                                </div>
                            </div>
                        </div>
                    </td>
                    ${daysHtml}
                    <td class="p-4 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <div class="w-full bg-slate-100 rounded-full h-2 max-w-[65px] overflow-hidden hidden sm:block"><div class="${palette.bg} h-full rounded-full" style="width: ${percentage}%"></div></div>
                            <span class="text-sm font-bold text-slate-500">${toPersianDigits(percentage)}٪</span>
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteHabitNode('${habit.id}')" class="text-slate-300 hover:text-rose-600 transition-colors p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>`;
                tbody.appendChild(tr);

                // ۲۸ روز اخیر رندر با باکس کپسولی دور روزهای هفته‌های موفق
                const matrixCard = document.createElement('div'); matrixCard.className = "bg-slate-50/50 border border-slate-200/60 rounded-xl p-4 flex flex-col justify-between";
                let weeksRowsHtml = ''; const baseSat = new Date(); const dToSat = baseSat.getDay() === 6 ? 0 : -(baseSat.getDay() + 1);
                baseSat.setDate(baseSat.getDate() + dToSat - 21); 

                for (let weekIdx = 0; weekIdx < 4; weekIdx++) {
                    let singleWeekDots = '';
                    let completionsInThisWeek = 0;

                    for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
                        const dayCellDate = new Date(baseSat); dayCellDate.setDate(baseSat.getDate() + (weekIdx * 7) + dayIdx);
                        const info = getStatusByDate(habit, dayCellDate); const isDone = info.isChecked || isGraceDayForDate(habit, dayCellDate);
                        if (isDone) completionsInThisWeek++;

                        const jCellDate = jalaali.toJalaali(dayCellDate.getFullYear(), dayCellDate.getMonth() + 1, dayCellDate.getDate());
                        const dotClass = isDone ? `w-2.5 h-2.5 ${palette.bg} rounded-md` : `w-2.5 h-2.5 bg-slate-200 rounded-md`;
                        singleWeekDots += `<div class="${dotClass}" title="روز ${toPersianDigits(jCellDate.jd)} ${JALAALI_MONTHS[jCellDate.jm - 1]}"></div>`;
                    }

                    const isGoalAchieved = completionsInThisWeek >= habit.weeklyGoal;
                    // اگر به هدف رسیده باشد، یک کپسول کمرنگ دور کل ۷ نقطه ایجاد می‌شود
                    const rowContainerClass = isGoalAchieved 
                        ? `${palette.weekCapsule} rounded-full px-3 py-1.5 shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)]` 
                        : "px-3 py-1.5 bg-transparent";

                    weeksRowsHtml += `
                        <div class="flex items-center justify-center transition-all ${rowContainerClass}">
                            <div class="flex items-center gap-1.5">${singleWeekDots}</div>
                        </div>`;
                }
                matrixCard.innerHTML = `<div class="flex justify-between items-center mb-3"><span class="font-bold text-slate-800 text-sm">${habit.title}</span><span class="text-xs font-medium px-2 py-0.5 rounded-md ${palette.lightBg} ${palette.text}">۲۸ روز اخیر</span></div><div class="space-y-1.5 bg-white border border-slate-100 rounded-lg p-3 shadow-3xs flex flex-col justify-center min-h-[130px]">${weeksRowsHtml}</div>`;
                chartsContainer.appendChild(matrixCard);
            });
        }

        document.getElementById('add-habit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const titleInput = document.getElementById('habit-title'); const goalSelect = document.getElementById('habit-goal');
            
            const newHabit = {
                id: 'habit_' + Math.random().toString(36).substr(2, 9),
                title: titleInput.value.trim(),
                weeklyGoal: parseInt(goalSelect.value, 10),
                colorPalette: COLOR_PALETTES[habits.length % COLOR_PALETTES.length], 
                history: {}, currentStreak: 0
            };
            newHabit.history[getJalaliStats(0).weekKey] = [false, false, false, false, false, false, false];
            habits.push(newHabit);
            titleInput.value = ''; goalSelect.value = '7';

            saveDataToDisk();
            renderApp();
        });

        window.deleteHabitNode = function(id) {
            if (confirm('آیا از حذف این عادت اطمینان دارید؟')) {
                habits = habits.filter(h => h.id !== id);
                saveDataToDisk();
                renderApp();
            }
        };

        function saveDataToDisk() {
            localStorage.setItem('habits_data', JSON.stringify(habits));
        }

        function loadDataFromDisk() {
            const savedHabits = localStorage.getItem('habits_data');
            if (savedHabits) {
                try {
                    habits = JSON.parse(savedHabits);
                } catch(e) {
                    habits = [];
                }
            } else {
                habits = [];
            }
            habits.forEach(h => h.currentStreak = calculateJalaliStreak(h));
        }

        window.onload = function() {
            const stats = getJalaliStats(0);
            const prDate = `${WEEKDAYS_FA[new Date().getDay()]}، ${stats.realJToday.jd} ${JALAALI_MONTHS[stats.realJToday.jm - 1]} ${stats.realJToday.jy}`;
            document.getElementById('current-date-display').innerText = `امروز: ${toPersianDigits(prDate)}`;
            loadDataFromDisk();
            renderApp();
        };
    </script>
</body>
</html>
